default_profile:
  flat:
    aerobic_pace: 420.0
    threshold_pace: 360.0
  uphill:
    - {grade: 3.0, value: 300.0}
    - {grade: 7.5, value: 550.0}
    - {grade: 12.5, value: 500.0}
    - {grade: 17.5, value: 400.0}
    - {grade: 22.5, value: 350.0}
  downhill:
    - {grade: -3.0, speed_mps: 2.8, vertical_speed_mph: 400.0}
    - {grade: -7.5, speed_mps: 2.5, vertical_speed_mph: 900.0}
    - {grade: -12.5, speed_mps: 2.2, vertical_speed_mph: 1100.0}
    - {grade: -17.5, speed_mps: 1.8, vertical_speed_mph: 1250.0}
    - {grade: -22.5, speed_mps: 1.5, vertical_speed_mph: 1300.0}
  fatigue:
    flat: [{hour: 0.0, factor: 1.0}, {hour: 3.0, factor: 1.0}, {hour: 5.0, factor: 0.90}, {hour: 8.0, factor: 0.80}]
    uphill: [{hour: 0.0, factor: 1.0}, {hour: 3.0, factor: 1.0}, {hour: 5.0, factor: 0.88}, {hour: 8.0, factor: 0.76}]
    downhill: [{hour: 0.0, factor: 1.0}, {hour: 3.0, factor: 1.0}, {hour: 5.0, factor: 0.88}, {hour: 8.0, factor: 0.72}]

activity_recency_weights:
  - {max_days: 30, weight: 1.0}
  - {max_days: 90, weight: 0.85}
  - {max_days: 180, weight: 0.65}
  - {max_days: null, weight: 0.40}

activity_type_weights:
  race: 1.0
  specific_training: 0.85
  normal_training: 0.65
  recovery: 0.35

ability_file:
  schema_version: "1.0"
  current_half_life_days: 90.0
  long_term_half_life_days: 365.0
  maximum_activities: 200
  maximum_uncompressed_mb: 200

confidence:
  default: 0.20
  duration_minutes:
    - {max: 10, score: 0.35}
    - {max: 30, score: 0.50}
    - {max: 90, score: 0.70}
    - {max: null, score: 0.85}
  maximum: 0.95

quality:
  max_speed_mps: 12.0
  max_altitude_jump_m: 50.0
  max_timestamp_gap_seconds: 120.0
  gpx_resample_distances_m: [50.0, 100.0, 200.0]

terrain:
  flat_grade_abs_percent: 2.0

environment:
  night_solar_elevation_degrees: -6.0
  altitude:
    threshold_m: 1500.0
    time_increase_per_1000m: 0.04
    coverage_margin_m: 500.0
    confidence_penalty: 0.08
    minimum_relative_factor: 0.90
    maximum_relative_factor: 1.30

historical_weather:
  endpoint: https://archive-api.open-meteo.com/v1/archive
  cache_directory: data/weather_cache
  timeout_seconds: 20.0
  representative_distance_km: 10.0
  representative_elevation_change_m: 400.0
  maximum_representative_points: 20
  skip_when_ambient_coverage: 0.80
  model_weight: 0.75
  local_exposure:
    solar_reference_wm2: 800.0
    wrist_relative_reference_c: 6.0
    solar_share: 0.60
    wrist_share: 0.40
    maximum_weight_reduction: 0.35

duration_capability:
  layers:
    - {name: short, label: 短时, min_hours: 0.0, max_hours: 2.0, center_hours: 1.0, fallback_time_factor: 0.96}
    - {name: medium, label: 中时, min_hours: 2.0, max_hours: 5.0, center_hours: 3.5, fallback_time_factor: 1.00}
    - {name: long, label: 长时, min_hours: 5.0, max_hours: 10.0, center_hours: 7.5, fallback_time_factor: 1.08}
    - {name: ultra, label: 超长, min_hours: 10.0, max_hours: null, center_hours: 12.0, fallback_time_factor: 1.16}
  convergence_tolerance_seconds: 30.0
  max_iterations: 8

conditions:
  current_form:
    very_good: {label: 状态很好, factor: 0.97}
    normal: {label: 状态正常, factor: 1.00}
    slight_fatigue: {label: 轻微疲劳, factor: 1.04}
    poor: {label: 状态较差, factor: 1.08}
    ill_or_injured: {label: 生病或伤病, factor: 1.15}
  technical_factors:
    0: {flat: 1.00, uphill: 1.00, downhill: 1.00}
    1: {flat: 1.01, uphill: 1.02, downhill: 1.04}
    2: {flat: 1.03, uphill: 1.04, downhill: 1.09}
    3: {flat: 1.05, uphill: 1.07, downhill: 1.16}
    4: {flat: 1.08, uphill: 1.12, downhill: 1.28}
  mud_per_level: {flat: 0.015, uphill: 0.025, downhill: 0.04}
  night_max: {flat: 0.00, uphill: 0.05, downhill: 0.10}
  carried_weight_per_kg: {flat: 0.003, uphill: 0.006, downhill: 0.002}
  heat:
    threshold_c: 20.0
    per_degree: 0.004
    humidity_threshold_percent: 70.0
    humidity_per_percent: 0.001

heart_rate_model:
  valid_min_bpm: 60.0
  valid_max_bpm: 220.0
  stable_window_seconds: 120
  minimum_stable_window_seconds: 60.0
  maximum_output_cv: 0.45
  threshold_percentile: 95.0
  intensity_zones:
    easy: {min_ratio: 0.00, max_ratio: 0.82}
    aerobic: {min_ratio: 0.82, max_ratio: 0.89}
    steady: {min_ratio: 0.89, max_ratio: 0.95}
    threshold: {min_ratio: 0.95, max_ratio: 1.02}
    high: {min_ratio: 1.02, max_ratio: 1.20}
  race_intensity_targets:
    - {max_hours: 2.0, conservative: 0.90, standard: 0.95, aggressive: 0.99}
    - {max_hours: 5.0, conservative: 0.86, standard: 0.91, aggressive: 0.95}
    - {max_hours: 8.0, conservative: 0.82, standard: 0.87, aggressive: 0.91}
    - {max_hours: 12.0, conservative: 0.78, standard: 0.83, aggressive: 0.87}
    - {max_hours: null, conservative: 0.74, standard: 0.79, aggressive: 0.83}
  strategy_output_limits:
    conservative: {min: 0.90, max: 1.00, downhill_max: 1.00}
    standard: {min: 0.95, max: 1.06, downhill_max: 1.01}
    aggressive: {min: 0.98, max: 1.12, downhill_max: 1.03}
  drift_hours: [0.0, 3.0, 5.0, 8.0]
  minimum_activity_hours_for_drift: 2.0
  expected_drift_bpm_at_5h: 6.0
  default_heat_sensitivity_bpm_per_degree: 0.30
  maximum_heat_sensitivity_bpm_per_degree: 1.20
  heat_sensitivity_max_elapsed_hours: 1.5
  heat_sensitivity_minimum_temperature_span_c: 5.0
  heat_drift_time_factor_scale: 0.010
  maximum_heat_drift_time_factor: 1.08

temperature_model:
  valid_min_c: -30.0
  valid_max_c: 60.0
  comfort_min_c: 10.0
  comfort_max_c: 20.0
  wrist_relative:
    warmup_minutes: 30.0
  direct_effect_max_elapsed_hours: 1.5
  nodes_c: [-5.0, 5.0, 10.0, 15.0, 20.0, 25.0, 30.0, 35.0, 40.0]
  default_curve:
    - {temperature_c: -5.0, time_factor: 1.06}
    - {temperature_c: 5.0, time_factor: 1.02}
    - {temperature_c: 10.0, time_factor: 1.00}
    - {temperature_c: 15.0, time_factor: 1.00}
    - {temperature_c: 20.0, time_factor: 1.00}
    - {temperature_c: 25.0, time_factor: 1.02}
    - {temperature_c: 30.0, time_factor: 1.05}
    - {temperature_c: 35.0, time_factor: 1.09}
    - {temperature_c: 40.0, time_factor: 1.15}
  minimum_personal_activities: 2
  minimum_personal_duration_minutes: 60.0
  node_evidence:
    minimum_activities: 2
    full_activities: 3
    minimum_duration_minutes: 30.0
    full_duration_minutes: 90.0
  maximum_personal_factor_adjustment: 0.05
  fatigue_threshold_above_reference_c: 5.0
  fatigue_time_increase_per_degree_hour: 0.0008
  maximum_fatigue_time_factor: 1.12
  humidity_interaction:
    activation_temperature_c: 20.0
    full_effect_temperature_c: 30.0
    threshold_percent: 70.0
    per_percent_at_full_effect: 0.001

monte_carlo:
  simulations: 3000
  min_simulations: 1000
  max_simulations: 10000
  seed: 2026
  sigma_at_confidence_zero: 0.16
  sigma_at_confidence_one: 0.025
  # Compatibility fallback for the aggregate probability API.
  condition_sigma: 0.02
  condition_activation_reference: 0.10
  condition_terrain_correlation: 0.85
  condition_source_sigma:
    heart_rate_pacing: 0.030
    form: 0.025
    technical: 0.035
    mud: 0.040
    night: 0.030
    altitude: 0.030
    carried_weight: 0.025
    weather: 0.035
    temperature_fatigue: 0.030
    heart_rate_fatigue: 0.030
  gpx_sigma_high_quality: 0.01
  gpx_sigma_low_quality: 0.06
  gpx_segment_correlation: 0.55
  terrain_correlation: 0.70
  fatigue_sigma_scale: 0.60
  duration_sigma_scale: 0.50
